<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>汾酒产品手册 · 杭州西溪青花汾酒体验中心</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --cream:#FAF8F4; --warm:#F5F2EC; --ink:#1C1810; --ink-mu:#8C8578;
  --blue:#154360; --blue2:#1A5276; --blue-lt:#D6EAF8; --div:#DDD8CE; --card:#fff;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{background:var(--cream);color:var(--ink);font-family:'Noto Serif SC','PingFang SC','Microsoft YaHei',serif;min-height:100vh;}

/* HEADER */
.hd{background:var(--blue);color:#fff;padding:36px 20px 26px;text-align:center;position:relative;overflow:hidden;}
.hd::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 130% 80% at 50% -10%,rgba(46,134,193,.35) 0%,transparent 65%);pointer-events:none;}
.hd-in{position:relative;z-index:1;}
.hd-badge{font-family:'EB Garamond',serif;font-size:10px;letter-spacing:3px;color:rgba(255,255,255,.5);text-transform:uppercase;display:block;margin-bottom:10px;}
.hd-title{font-size:27px;font-weight:700;letter-spacing:6px;line-height:1.35;margin-bottom:5px;}
.hd-sub{font-size:12px;font-weight:300;letter-spacing:3px;color:rgba(255,255,255,.6);margin-bottom:16px;}
.hd-line{width:34px;height:1px;background:rgba(255,255,255,.3);margin:0 auto 11px;}
.hd-info{font-size:11px;color:rgba(255,255,255,.4);letter-spacing:1.5px;font-family:'EB Garamond',serif;}

/* INTRO */
.intro{background:var(--warm);border-bottom:1px solid var(--div);padding:12px 16px;display:flex;align-items:center;gap:12px;}
.intro-icon{width:32px;height:32px;background:var(--blue-lt);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.intro-txt{font-size:11px;color:var(--ink-mu);line-height:1.7;}
.intro-txt strong{color:var(--ink);}

/* SERIES LIST */
.series-list{padding:12px 14px;display:flex;flex-direction:column;gap:8px;max-width:600px;margin:0 auto;}

/* SERIES CARD */
.sc{background:var(--card);border-radius:10px;overflow:hidden;box-shadow:0 1px 6px rgba(28,24,16,.07);border:1px solid var(--div);}
.sc-header{display:flex;align-items:center;width:100%;background:none;border:none;padding:16px;cursor:pointer;gap:14px;font-family:inherit;text-align:left;}
.sc-num{font-family:'EB Garamond',serif;font-size:22px;font-style:italic;color:var(--div);flex-shrink:0;width:28px;line-height:1;}
.sc-info{flex:1;min-width:0;}
.sc-name{font-size:16px;font-weight:600;letter-spacing:2px;color:var(--ink);line-height:1.2;}
.sc-en{font-size:10px;color:var(--ink-mu);letter-spacing:1px;margin-top:2px;font-family:'EB Garamond',serif;}
.sc-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}
.sc-count{font-size:10px;color:var(--blue2);background:var(--blue-lt);padding:3px 9px;border-radius:20px;letter-spacing:.8px;}
.sc-arrow{width:20px;height:20px;display:flex;align-items:center;justify-content:center;transition:transform .3s ease;}
.sc-arrow svg{width:14px;height:14px;stroke:var(--ink-mu);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.sc.open .sc-arrow{transform:rotate(180deg);}

/* PRODUCT GRID */
.sc-body{display:none;border-top:1px solid var(--div);}
.sc.open .sc-body{display:block;}
.prod-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--div);}

/* PRODUCT THUMB */
.pt{background:var(--card);padding:10px 8px 9px;cursor:pointer;display:flex;flex-direction:column;align-items:center;border:none;font-family:inherit;width:100%;}
.pt:active{background:#F0EDE8;}
.pt-img{width:100%;aspect-ratio:2/3;display:flex;align-items:center;justify-content:center;background:var(--warm);border-radius:3px;margin-bottom:7px;overflow:hidden;}
.pt-img img{width:100%;height:100%;object-fit:contain;}
.pt-img svg{opacity:.12;}
.pt-ph{width:100%;height:100%;flex-direction:column;align-items:center;justify-content:center;gap:5px;background:var(--warm);}
.pt-ph span:first-child{font-size:20px;}
.pt-ph span:last-child{font-size:9px;color:var(--ink-mu);letter-spacing:1px;}
.pt-name{font-size:10.5px;font-weight:600;color:var(--ink);letter-spacing:.2px;line-height:1.35;text-align:center;margin-bottom:3px;}
.pt-price{font-family:'EB Garamond',serif;font-size:12px;color:var(--blue2);font-weight:500;}

/* MODAL */
.ov{position:fixed;inset:0;background:rgba(28,24,16,.55);z-index:200;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;}
.ov.on{opacity:1;pointer-events:auto;}
.sheet{background:var(--card);width:100%;max-width:480px;max-height:88vh;border-radius:16px 16px 0 0;overflow-y:auto;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);scrollbar-width:none;}
.sheet::-webkit-scrollbar{display:none;}
.ov.on .sheet{transform:translateY(0);}
.sh-handle{width:34px;height:4px;background:var(--div);border-radius:2px;margin:12px auto 0;}
.sh-top{padding:13px 18px 0;display:flex;justify-content:space-between;align-items:center;}
.sh-series{font-size:10px;letter-spacing:2px;color:var(--blue2);background:var(--blue-lt);padding:3px 9px;border-radius:20px;}
.sh-close{width:28px;height:28px;border-radius:50%;border:1px solid var(--div);background:none;color:var(--ink-mu);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.sh-img{width:58%;max-width:190px;margin:13px auto;display:block;object-fit:contain;}
.sh-placeholder{width:58%;max-width:190px;margin:13px auto;aspect-ratio:3/4;flex-direction:column;align-items:center;justify-content:center;gap:8px;background:var(--warm);border-radius:8px;}
.sh-ph-icon{font-size:32px;}
.sh-ph-text{font-size:11px;color:var(--ink-mu);letter-spacing:1.5px;}
.sh-body{padding:0 18px 28px;}
.sh-name{font-size:20px;font-weight:700;letter-spacing:2px;color:var(--ink);margin-bottom:4px;}
.sh-price{font-family:'EB Garamond',serif;font-size:24px;color:var(--blue2);font-weight:500;margin-bottom:16px;}
.sh-hr{height:1px;background:var(--div);margin-bottom:13px;}
.sh-specs{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.sp-cell{background:var(--warm);border-radius:7px;padding:10px 12px;}
.sp-lbl{font-size:9px;color:var(--ink-mu);letter-spacing:2px;margin-bottom:3px;}
.sp-val{font-size:13px;font-weight:500;color:var(--ink);}
.sp-val.code{font-family:'EB Garamond',serif;font-size:12px;color:var(--blue2);letter-spacing:1.5px;}

/* FOOTER */
.footer{background:var(--ink);color:rgba(255,255,255,.4);text-align:center;padding:24px 20px;font-size:11px;letter-spacing:2px;line-height:2.2;margin-top:16px;}
.footer strong{color:rgba(255,255,255,.65);}

@keyframes slideDown{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}
.sc-body.anim{animation:slideDown .25s ease both;}
</style>
</head>
<body>

<div class="hd">
  <div class="hd-in">
    <span class="hd-badge">Fenjiu · Product Catalog 2026</span>
    <div class="hd-title">汾酒产品手册</div>
    <div class="hd-sub">杭州西溪青花汾酒体验中心</div>
    <div class="hd-line"></div>
    <div class="hd-info">全系列 42 款 · 经销商报价</div>
  </div>
</div>

<div class="intro">
  <div class="intro-icon">🏮</div>
  <div class="intro-txt"><strong>点击系列</strong>展开产品 · <strong>点击产品</strong>查看详情与价格</div>

<div class="footer">

    <div class="sh-body">

      <div class="sh-specs">

var SERIES=[
  {id:"s1",num:"01",name:"青花汾酒",en:"Blue & White Fenjiu · Flagship"},
  {id:"s2",num:"02",name:"文创系列",en:"Cultural Creative · Art & Craft"},
  {id:"s3",num:"03",name:"生肖系列",en:"Chinese Zodiac Collection"},
  {id:"s4",num:"04",name:"巴拿马系列",en:"Panama Award · Since 1915"},
  {id:"s5",num:"05",name:"老白汾系列",en:"Lao Bai Fen · Heritage Line"},
  {id:"s6",num:"06",name:"玻瓶系列",en:"Glass Bottle · Classic Edition"},
  {id:"s7",num:"07",name:"年份老酒",en:"Vintage Reserve · Aged Collection"}
];

function noImg(){
  return '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>';
}

function build(){
  var list = document.getElementById('seriesList');
  var html = '';
  SERIES.forEach(function(s){
    var prods = DATA.filter(function(d){ return d.sk === s.id; });
    var thumbs = prods.map(function(p){
      var idx = DATA.indexOf(p);
      return '<button class="pt" onclick="openSheet('+idx+')">'
        + '<div class="pt-img">'
        + '<img src="images/'+p.c+'.webp" alt="'+p.n+'" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'"><div class="pt-ph" style="display:none"><span>🔮</span><span>敬请期待</span></div></div>'
        + '<div class="pt-name">'+p.n+'</div>'
        + '<div class="pt-price">'+p.p+'</div>'
        + '</button>';
    }).join('');

    html += '<div class="sc" id="'+s.id+'">'
      + '<button class="sc-header" onclick="toggleSeries(\''+s.id+'\')">'
        + '<div class="sc-num">'+s.num+'</div>'
        + '<div class="sc-info">'
          + '<div class="sc-name">'+s.name+'</div>'
          + '<div class="sc-en">'+s.en+'</div>'
        + '</div>'
        + '<div class="sc-right">'
          + '<div class="sc-count">'+prods.length+' 款</div>'
          + '<div class="sc-arrow"><svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></div>'
        + '</div>'
      + '</button>'
      + '<div class="sc-body"><div class="prod-grid">'+thumbs+'</div></div>'
      + '</div>';
  });
  list.innerHTML = html;
}

function toggleSeries(id){
  var sc = document.getElementById(id);
  var body = sc.querySelector('.sc-body');
  var isOpen = sc.classList.contains('open');
  if(isOpen){
    sc.classList.remove('open');
  } else {
    sc.classList.add('open');
    body.classList.add('anim');
    body.addEventListener('animationend', function(){ body.classList.remove('anim'); }, {once:true});
  }
}

function openSheet(idx){
  var p = DATA[idx];
  document.getElementById('m-sr').textContent = p.sr;
  document.getElementById('m-name').textContent = p.n;
  document.getElementById('m-price').textContent = '¥ ' + p.p;
  document.getElementById('m-abv').textContent = p.a;
  document.getElementById('m-vol').textContent = p.v;
  document.getElementById('m-spec').textContent = p.sp;
  document.getElementById('m-code').textContent = p.c;
  var img = document.getElementById('m-img');
  var ph  = document.getElementById('m-placeholder');
  img.style.display = 'block';
  ph.style.display  = 'none';
  img.src = 'images/' + p.c + '.webp';
  document.getElementById('ov').classList.add('on');
  document.body.style.overflow = 'hidden';
}

function closeSheet(){
  document.getElementById('ov').classList.remove('on');
  document.body.style.overflow = '';
}

function maybeClose(e){
  if(e.target === document.getElementById('ov')) closeSheet();
}

document.addEventListener('keydown', function(e){ if(e.key==='Escape') closeSheet(); });
build();
</script>
</body>
</html>
